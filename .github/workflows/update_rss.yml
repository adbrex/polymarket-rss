name: Polymarket RSS 毎日更新
 
on:
  schedule:
      - cron: "0 21 * * *"  # 毎日 朝6時（JST）= UTC 21:00
      - cron: "0 9 * * *"   # 毎日 夜18時（JST）= UTC 9:00
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  generate-rss:
    runs-on: ubuntu-latest
 
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
 
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: 翻訳ライブラリをインストール
        run: pip install deep-translator
 
      - name: RSSフィード生成
        run: python generate_rss.py
 
      - name: GitHub Pages へコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || git commit -m "chore: update Polymarket RSS $(date +'%Y-%m-%d')"
          git push
 
