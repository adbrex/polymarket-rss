name: Polymarket RSS 毎日更新
 
on:
  schedule:
    # 毎日 午前9時（JST）= UTC 0:00 に実行
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能
 
permissions:
  contents: write
 
jobs:
  generate-rss:
    runs-on: ubuntu-latest
 
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
 
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: RSSフィード生成
        run: python generate_rss.py
 
      - name: GitHub Pages へコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || git commit -m "chore: update Polymarket RSS $(date +'%Y-%m-%d')"
          git push
 
